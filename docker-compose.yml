version: "3.8"

services:
  fraud-detector:
    image: 326158158021.dkr.ecr.ap-south-1.amazonaws.com/fraud-detection-app:latest
    container_name: fraud-detection-app
    volumes:
      - ./data:/app/data
      - /home/ubuntu/.aws:/root/.aws:ro
    environment:
      - PYTHONUNBUFFERED=1
      - AWS_DEFAULT_REGION=ap-south-1
    restart: on-failure
